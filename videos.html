<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; }
        .header { display: flex; align-items: center; padding: 0 24px; height: 56px; background: #0f0f0f; border-bottom: 1px solid #222; }
        .logo { display: flex; align-items: center; gap: 4px; font-size: 18px; font-weight: 700; color: #fff; text-decoration: none; }
        .logo-icon { width: 30px; height: 20px; background: #ff0000; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .logo-icon::after { content: '▶'; font-size: 10px; color: white; }
        .main-content { margin: 56px auto 0 auto; max-width: 900px; padding: 32px 16px; }
        h1 { font-size: 2rem; margin-bottom: 24px; }
        .video-list { display: flex; flex-direction: column; gap: 24px; }
        .video-card { background: #181818; border-radius: 12px; display: flex; gap: 20px; padding: 20px; align-items: center; }
        .thumbnail { width: auto; height: 16vw; aspect-ratio: 9 / 16; background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; }
        .video-info { flex: 1; }
        .video-title { font-size: 1.2rem; font-weight: 500; margin-bottom: 8px; }
        .video-meta { color: #aaa; font-size: 0.95rem; }
        a { color: #3ea6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Responsive styles */
        @media (max-width: 600px) {
            .main-content {
                padding: 16px 4px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .video-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 12px;
                gap: 10px;
            }
            .thumbnail {
                width: 100%;
                max-width: 100%;
                height: 180px;
                font-size: 2rem;
            }
            .video-title {
                font-size: 1rem;
            }
            .video-meta {
                font-size: 0.85rem;
            }
        }
        @media (min-width: 601px) and (max-width: 900px) {
            .main-content {
                padding: 24px 8px;
            }
            .video-card {
                gap: 12px;
                padding: 16px;
            }
            .thumbnail {
                width: 120px;
                height: 68px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="my-videos.html" class="logo">
            <div class="logo-icon"></div>
            Video-Spot
        </a>
    </header>
    <main class="main-content">
        <h1>All Videos</h1>
        <div class="video-list">
            <div class="video-card">
                <div class="thumbnail">▶</div>
                <div class="video-info">
                    <div class="video-title">Sample Video 1</div>
                    <div class="video-meta">10:32 • 1.2K views</div>
                </div>
            </div>
            <div class="video-card">
                <div class="thumbnail">▶</div>
                <div class="video-info">
                    <div class="video-title">Sample Video 2</div>
                    <div class="video-meta">15:45 • 3.4K views</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
